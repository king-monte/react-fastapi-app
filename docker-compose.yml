services:

  frontend:
    image: k1n9m0n73/react-frontend:latest
    container_name: frontend

  backend:
    image: k1n9m0n73/fastapi-backend:latest
    container_name: backend

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - frontend
      - backend